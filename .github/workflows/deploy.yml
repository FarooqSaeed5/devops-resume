name: Deploy Portfolio Website

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your portfolio code onto the Linux machine
      - name: Checkout Code
        uses: actions/checkout@v5

      # Step B: System Health Check (The Pressure Test)
      - name: System Health Check
        run: |
          echo "Checking system infrastructure..."
          if [ -f index.html ]; then echo "index.html exists"; else echo "ERROR: index.html missing" && exit 1; fi
          if [ -f software.html ]; then echo "software.html exists"; else echo "ERROR: software.html missing" && exit 1; fi
          if [ -f plumbing.html ]; then echo "plumbing.html exists"; else echo "ERROR: plumbing.html missing" && exit 1; fi
          echo "All core digital pipes are intact. No leaks found!"

      # Step C: Deploy the verified files securely to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages